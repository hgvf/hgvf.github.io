<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Firestore Seeder</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 2rem; }
    button { padding: 0.6rem 1.4rem; background: #4f8ef7; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-right: 0.6rem; margin-bottom: 0.6rem; }
    button.prices { background: #2fae62; }
    button:disabled { background: #555; cursor: default; }
    #log { margin-top: 1.5rem; white-space: pre-wrap; line-height: 1.6; }
    .ok  { color: #6f6; }
    .err { color: #f66; }
  </style>
</head>
<body>
  <h2>Firestore Seeder</h2>
  <p>必須先登入 Google（在主站登入後再開此頁），點下方按鈕將冷資料寫入 Firestore。</p>
  <button id="btnWatchlist">Seed Watchlist（data/watchlist.json）</button>
  <button id="btnPrices" class="prices">Seed Prices（data/prices.json）</button>
  <div id="log"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDT4eEQZXnqTBn17LGrg9isYFRFFNCbI-I",
      authDomain:        "watchlist-7fd99.firebaseapp.com",
      projectId:         "watchlist-7fd99",
      storageBucket:     "watchlist-7fd99.firebasestorage.app",
      messagingSenderId: "1074341286002",
      appId:             "1:1074341286002:web:bda4e06fc474b4789072eb",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const log = document.getElementById('log');
    function print(msg, cls) {
      const s = document.createElement('span');
      s.className = cls || '';
      s.textContent = msg + '\n';
      log.appendChild(s);
    }

    async function ensureSignedIn() {
      if (auth.currentUser) {
        print('已登入: ' + auth.currentUser.email, 'ok');
        return true;
      }
      try {
        print('正在登入...');
        await signInWithPopup(auth, new GoogleAuthProvider());
        print('登入成功: ' + auth.currentUser.email, 'ok');
        return true;
      } catch (e) {
        print('登入失敗: ' + e.message, 'err');
        return false;
      }
    }

    /* ── Seed watchlist ────────────────────────────── */
    document.getElementById('btnWatchlist').addEventListener('click', async () => {
      const btn = document.getElementById('btnWatchlist');
      btn.disabled = true;
      log.innerHTML = '';
      if (!(await ensureSignedIn())) { btn.disabled = false; return; }

      try {
        const res = await fetch('data/watchlist.json?t=' + Date.now());
        const WATCHLIST = await res.json();

        for (let si = 0; si < WATCHLIST.sectors.length; si++) {
          const sector = WATCHLIST.sectors[si];
          const sectorId = sector.id;
          print(`\n[Sector] ${sector.name}`);
          await setDoc(doc(db, 'sectors', sectorId), {
            name: sector.name,
            ticker_overview: sector.ticker_overview || [],
            order: sector.order ?? si,
          }, { merge: true });
          print(`  sectors/${sectorId} ✓`, 'ok');

          for (let ui = 0; ui < (sector.subsectors || []).length; ui++) {
            const sub = sector.subsectors[ui];
            const subId = sub.id;
            print(`  [Subsector] ${sub.name}`);
            await setDoc(doc(db, 'subsectors', subId), {
              sector_id: sectorId,
              name: sub.name,
              notes: sub.notes || '',
              order: sub.order ?? ui,
            }, { merge: true });
            print(`    subsectors/${subId} ✓`, 'ok');

            for (let ti = 0; ti < (sub.tickers || []).length; ti++) {
              const t = sub.tickers[ti];
              // Use composite key so the same symbol can exist in multiple subsectors
              const tickerId = `${subId}_${t.symbol}`;
              await setDoc(doc(db, 'tickers', tickerId), {
                subsector_id: subId,
                sector_id: sectorId,
                symbol: t.symbol,
                name: t.name || '',
                market: t.market || 'US',
                order: t.order ?? ti,
              }, { merge: true });
              print(`      ticker ${t.symbol} ✓`, 'ok');
            }

            for (let ai = 0; ai < (sub.analysis || []).length; ai++) {
              const a = sub.analysis[ai];
              const rowsFlat = (a.rows || []).map(row =>
                typeof row === 'string' ? row : JSON.stringify(row)
              );
              await setDoc(doc(db, 'analysis', a.id), {
                subsector_id: subId,
                sector_id: sectorId,
                title: a.title || '',
                columns: a.columns || [],
                rows: rowsFlat,
                order: a.order ?? ai,
              }, { merge: true });
              print(`      analysis "${a.title}" ✓`, 'ok');
            }

            for (let ri = 0; ri < (sub.research_notes || []).length; ri++) {
              const r = sub.research_notes[ri];
              await setDoc(doc(db, 'research_notes', r.id), {
                subsector_id: subId,
                sector_id: sectorId,
                title: r.title || '',
                content: r.content || '',
                order: r.order ?? ri,
              }, { merge: true });
              print(`      research_note "${r.title}" ✓`, 'ok');
            }
          }
        }
        print('\nWatchlist 完成！請重新整理主站。', 'ok');
      } catch (e) {
        print('錯誤: ' + e.message, 'err');
      }
      btn.disabled = false;
    });

    /* ── Seed prices ──────────────────────────────── */
    document.getElementById('btnPrices').addEventListener('click', async () => {
      const btn = document.getElementById('btnPrices');
      btn.disabled = true;
      log.innerHTML = '';
      if (!(await ensureSignedIn())) { btn.disabled = false; return; }

      try {
        const res = await fetch('data/prices.json?t=' + Date.now());
        const data = await res.json();
        const prices = data.prices || {};
        const symbols = Object.keys(prices);
        print(`\n讀到 ${symbols.length} 檔報價`);

        for (const sym of symbols) {
          await setDoc(doc(db, 'prices', sym), prices[sym]);
          print(`  prices/${sym} ✓`, 'ok');
        }
        print('\nPrices 完成！請重新整理主站。', 'ok');
      } catch (e) {
        print('錯誤: ' + e.message, 'err');
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
