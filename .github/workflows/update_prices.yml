name: Update Stock Prices (disabled)
# Superseded by sync_firestore.yml — prices.json is now synced from Firestore.

on:
  workflow_dispatch:   # keep available for manual one-off runs if needed

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance
      - name: Fetch prices
        run: python scripts/update_prices.py
      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update stock prices $(date -u +%Y-%m-%d)"
          git push
